# Container-internal reverse proxy for docker compose --profile production.
# Hostnames `app` and `service` resolve via the compose bridge network.
# For host-based deploys with TLS/Let's Encrypt, use ops/nginx.conf instead.

upstream streamlit_upstream {
    server app:8501;
}

upstream fastapi_upstream {
    server service:8000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    # FastAPI REST API
    location /api/ {
        proxy_pass http://fastapi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Streamlit WebSocket (must come before location /)
    location /_stcore/stream {
        proxy_pass http://streamlit_upstream/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Streamlit UI
    location / {
        proxy_pass http://streamlit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}
